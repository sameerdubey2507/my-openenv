<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EMERGI-ENV · OpenAPI Spec</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #020817;
      --bg2: #0a1628;
      --glass: rgba(15, 31, 61, .55);
      --border: rgba(59, 130, 246, .15);
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --cyan: #06b6d4;
      --green: #10b981;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --hint: #1e293b;
      --mono: 'JetBrains Mono', monospace
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .25
    }

    #topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(2, 8, 23, .9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      height: 60px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: slideDown 0.8s 2s ease both
    }
    
    /* Init sequence */
    #startup-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg); display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: var(--mono); color: var(--cyan);
      animation: fadeOut 0.5s 1.8s forwards;
      pointer-events: none;
    }
    .startup-pulse {
      width: 50px; height: 50px; border: 2px solid var(--blue);
      border-radius: 50%; border-top-color: var(--cyan);
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    .startup-text::after {
      content: ''; animation: textSequence 1.5s linear forwards;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    @keyframes textSequence {
      0% { content: 'INITIALIZING UPLINK...'; }
      30% { content: 'VERIFYING SIGNATURES...'; }
      60% { content: 'LOADING API SCHEMAS...'; }
      90% { content: 'ESTABLISHING SECURE CONN...'; }
      100% { content: 'ACCESS GRANTED.'; color: var(--green); }
    }

    @keyframes slideDown {
      from {
        transform: translateY(-60px);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(59, 130, 246, .4)
    }

    .brand-text {
      font-weight: 700;
      font-size: 15px;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .nav-right {
      display: flex;
      gap: 8px
    }

    .nav-btn {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, .06);
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .nav-btn:hover {
      color: var(--text);
      border-color: rgba(59, 130, 246, .4);
      background: rgba(59, 130, 246, .08)
    }

    .nav-btn.active {
      background: linear-gradient(135deg, rgba(59, 130, 246, .2), rgba(139, 92, 246, .15));
      color: var(--blue);
      border-color: rgba(59, 130, 246, .35)
    }

    /* Layout */
    #page {
      display: flex;
      height: calc(100vh - 60px);
      position: relative;
      z-index: 1;
      animation: fadeInPage 1s 2s both;
    }
    
    @keyframes fadeInPage {
      from { opacity: 0; filter: blur(5px); }
      to { opacity: 1; filter: blur(0); }
    }

    /* Sidebar */
    #sidebar {
      width: 280px;
      flex-shrink: 0;
      background: rgba(5, 13, 30, .8);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideLeft .5s .2s both
    }

    @keyframes slideLeft {
      from {
        transform: translateX(-280px);
        opacity: 0
      }

      to {
        transform: none;
        opacity: 1
      }
    }

    .sb-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border)
    }

    .sb-search {
      width: 100%;
      background: rgba(0, 0, 0, .3);
      border: 1px solid var(--hint);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: border-color .2s
    }

    .sb-search:focus {
      border-color: var(--blue)
    }

    .sb-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--hint) transparent
    }

    .sb-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      padding: 12px 12px 4px;
      text-transform: uppercase
    }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      transition: all .15s;
      margin: 1px 0
    }

    .sb-item:hover {
      background: rgba(59, 130, 246, .08);
      color: var(--text)
    }

    .sb-item.active {
      background: rgba(59, 130, 246, .12);
      color: var(--blue);
      font-weight: 600
    }

    .sb-item.schema {
      color: var(--purple)
    }

    .sb-item.schema:hover,
    .sb-item.schema.active {
      background: rgba(139, 92, 246, .08);
      color: var(--purple)
    }

    .m {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: .5px;
      min-width: 40px;
      text-align: center
    }

    .m-GET {
      background: rgba(16, 185, 129, .2);
      color: #34d399
    }

    .m-POST {
      background: rgba(59, 130, 246, .2);
      color: #60a5fa
    }

    .m-DELETE {
      background: rgba(239, 68, 68, .2);
      color: #f87171
    }

    .m-PUT {
      background: rgba(245, 158, 11, .2);
      color: #fbbf24
    }

    .m-PATCH {
      background: rgba(139, 92, 246, .2);
      color: #a78bfa
    }

    /* Main viewer */
    #viewer {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--hint) transparent
    }

    #viewer::-webkit-scrollbar {
      width: 6px
    }

    #viewer::-webkit-scrollbar-thumb {
      background: var(--hint);
      border-radius: 4px
    }

    /* Info header */
    #info-banner {
      background: linear-gradient(135deg, rgba(59, 130, 246, .08), rgba(139, 92, 246, .06));
      border-bottom: 1px solid var(--border);
      padding: 32px 40px;
      animation: fadein .5s .3s both
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .spec-title {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 6px
    }

    .spec-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 700px
    }

    .spec-meta {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap
    }

    .meta-badge {
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid;
      display: flex;
      align-items: center;
      gap: 5px
    }

    .badge-version {
      background: rgba(59, 130, 246, .1);
      color: var(--blue);
      border-color: rgba(59, 130, 246, .25)
    }

    .badge-openapi {
      background: rgba(16, 185, 129, .1);
      color: var(--green);
      border-color: rgba(16, 185, 129, .25)
    }

    .badge-endpoints {
      background: rgba(139, 92, 246, .1);
      color: var(--purple);
      border-color: rgba(139, 92, 246, .25)
    }

    .dl-btn {
      margin-left: auto;
      padding: 8px 18px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #1e40af, var(--blue));
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all .3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, .2)
    }

    .dl-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 20px rgba(59, 130, 246, .4)
    }

    .dl-btn:active {
      transform: scale(0.95)
    }

    /* Sections */
    #sections {
      padding: 24px 40px;
      display: flex;
      flex-direction: column;
      gap: 32px
    }

    .path-group {
      animation: fadein .4s ease both
    }

    .path-group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      align-items: start;
    }

    .path-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-left: 4px
    }

    .path-card {
      background: var(--glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: border-color .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .path-card:hover {
      border-color: rgba(59, 130, 246, .25);
      box-shadow: 0 4px 20px rgba(0, 0, 0, .2)
    }

    .path-card-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      padding: 20px;
      cursor: pointer;
      transition: background .15s;
    }

    .path-name {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      word-break: break-all;
    }

    .path-summary {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .chev {
      color: var(--muted);
      font-size: 11px;
      transition: transform .3s;
      align-self: flex-end;
      margin-top: auto;
    }

    .path-card.open .chev {
      transform: rotate(180deg)
    }

    .path-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s cubic-bezier(.4, 0, .2, 1)
    }

    .path-card.open .path-body {
      max-height: 1500px;
      overflow-y: auto;
    }

    .path-inner {
      padding: 0 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px
    }

    .op-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      padding: 10px 14px;
      background: rgba(0, 0, 0, .2);
      border-radius: 8px;
      border-left: 3px solid rgba(59, 130, 246, .4)
    }

    .field-table {
      width: 100%;
      border-collapse: collapse
    }

    .field-table th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .8px;
      color: var(--muted);
      text-align: left;
      padding: 5px 10px;
      border-bottom: 1px solid var(--hint)
    }

    .field-table td {
      font-size: 12px;
      padding: 7px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, .02);
      vertical-align: top
    }

    .field-table tr:last-child td {
      border-bottom: none
    }

    .fn {
      font-family: var(--mono);
      color: var(--cyan);
      font-size: 12px
    }

    .ft {
      color: var(--purple);
      font-size: 11px;
      font-family: var(--mono)
    }

    .fr {
      color: var(--red);
      font-size: 10px;
      font-weight: 700
    }

    .resp-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0
    }

    .code {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      min-width: 40px
    }

    .code-2 {
      color: var(--green)
    }

    .code-4 {
      color: var(--amber)
    }

    .code-5 {
      color: var(--red)
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--muted);
      margin-bottom: 6px;
      margin-top: 8px;
    }

    /* Schema panel & Try it */
    .schema-card {
      background: var(--glass);
      border: 1px solid rgba(139, 92, 246, .2);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .schema-header {
      padding: 20px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      background: rgba(139, 92, 246, .04);
      flex: 1;
    }

    .schema-name {
      font-family: var(--mono);
      color: var(--purple);
      font-size: 14px;
      font-weight: 500;
      flex: 1
    }

    .schema-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .3s ease
    }

    .schema-card.open .schema-body {
      max-height: 800px
    }

    .schema-card.open .chev {
      transform: rotate(180deg)
    }

    .json-pre {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      color: #94a3b8;
      padding: 14px 18px;
      background: rgba(0, 0, 0, .2);
      overflow-x: auto;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid var(--hint);
    }

    .json-pre::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .json-pre::-webkit-scrollbar-track {
      background: transparent;
    }

    .json-pre::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .json-pre::-webkit-scrollbar-thumb:hover {
      background: rgba(59, 130, 246, 0.5);
    }

    .json-pre::-webkit-scrollbar-corner {
      background: transparent;
    }

    .j-key {
      color: #7dd3fc
    }

    .j-str {
      color: #86efac
    }

    .j-num {
      color: #fca5a5
    }

    .j-bool {
      color: #c4b5fd
    }

    .j-null {
      color: #94a3b8
    }

    /* INTERACTIVE FORMS */
    .try-btn {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .try-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
    }

    .try-btn:active {
      transform: scale(0.95);
    }

    .param-input {
      width: 100%;
      margin-bottom: 6px;
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--hint);
      outline: none;
      transition: border-color 0.2s;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
    }

    .param-input:focus {
      border-color: var(--blue);
    }

    .req-body-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      color: var(--green);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--hint);
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
      resize: vertical;
      min-height: 100px;
      max-height: 400px;
    }

    .req-body-input:focus {
      border-color: var(--purple);
    }

    .res-container {
      margin-top: 15px;
      animation: fadein 0.3s ease;
    }

    /* JSON Modal Overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 85vw;
      height: 85vh;
      display: flex;
      flex-direction: column;
      transform: translateY(40px) scale(0.95);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(59, 130, 246, 0.15) inset;
      overflow: hidden;
    }

    .modal-overlay.open .modal-content {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--hint);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      flex: 1;
      overflow: hidden;
      padding: 20px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .modal-btn {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .modal-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 2px 10px rgba(255, 255, 255, 0.05);
    }

    .modal-btn:active {
      transform: scale(0.95);
    }

    .modal-btn.primary {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border: none;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
    }

    .modal-btn.primary:hover {
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
      transform: translateY(-1px);
    }

    .modal-btn.danger {
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.05);
    }

    .modal-btn.danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }
  </style>
</head>

<body>
  <!-- Startup Animation -->
  <div id="startup-overlay">
    <div class="startup-pulse"></div>
    <div class="startup-text"></div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="topbar">
    <div class="brand">
      <div class="brand-icon">🚑</div>
      <div class="brand-text">EMERGI-ENV</div>
      <span
        style="font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.25);font-weight:600">OpenAPI
        3.1 Interactive</span>
    </div>
    <div class="nav-right">
      <a href="/docs" class="nav-btn">📄 Docs</a>
      <a href="/redoc" class="nav-btn">📘 API Ref</a>
      <a href="/openapi-viewer" class="nav-btn active">⚙ OpenAPI</a>
      <a href="/health-dashboard" class="nav-btn">💚 Health</a>
    </div>
  </div>

  <div id="page">
    <div id="sidebar">
      <div class="sb-header">
        <input class="sb-search" id="sb-search" placeholder="🔍 Filter paths…" oninput="filterSidebar(this.value)" />
      </div>
      <div class="sb-list" id="sb-list">
        <div style="color:var(--muted);font-size:13px;padding:20px;text-align:center">Loading spec…</div>
      </div>
    </div>

    <div id="viewer">
      <div id="info-banner">
        <div style="display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap">
          <div style="flex:1">
            <div class="spec-title" id="api-title">EMERGI-ENV</div>
            <div class="spec-desc" id="api-desc">Loading…</div>
            <div class="spec-meta">
              <div class="meta-badge badge-version">📦 <span id="api-version">—</span></div>
              <div class="meta-badge badge-openapi">✅ OpenAPI <span id="api-openapi">—</span></div>
              <div class="meta-badge badge-endpoints">⚡ <span id="api-endpoints">0</span> endpoints</div>
            </div>
          </div>
          <a href="javascript:void(0)" onclick="openJsonModal()" class="dl-btn"><span>📜 View Raw OpenAPI
              JSON</span></a>
        </div>
      </div>
      <div id="sections">
        <div style="color:var(--muted);font-size:13px;text-align:center;padding:40px">Loading specification…</div>
      </div>
    </div>
  </div>

  <!-- Raw JSON Modal -->
  <div id="json-modal" class="modal-overlay" onclick="if(event.target===this) this.classList.remove('open')">
    <div class="modal-content">
      <div class="modal-header">
        <div style="display:flex;align-items:center;gap:12px">
          <span
            style="font-size:20px;background:var(--blue);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 15px rgba(59,130,246,0.5)">{
            }</span>
          <span style="font-weight:700;color:var(--text);font-size:16px;letter-spacing:1px">openapi.json</span>
        </div>
        <div style="display:flex;">
          <button class="modal-btn primary" onclick="copyJson(this)">📋 Copy to Clipboard</button>
          <button class="modal-btn danger" onclick="document.getElementById('json-modal').classList.remove('open')">✖
            Close JSON</button>
        </div>
      </div>
      <div class="modal-body">
        <pre id="modal-json-pre" class="json-pre"
          style="height:100%;margin:0;border:none;background:transparent;"></pre>
      </div>
    </div>
  </div>

  <script>
    /* PARTICLES */
    (() => {
      const c = document.getElementById('canvas'), ctx = c.getContext('2d');
      const resize = () => { c.width = innerWidth; c.height = innerHeight }; resize(); window.addEventListener('resize', resize);
      const pts = Array.from({ length: 40 }, () => ({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, vx: (Math.random() - .5) * .25, vy: (Math.random() - .5) * .25, hue: Math.random() < .5 ? 210 : 260 }));
      const draw = () => {
        ctx.clearRect(0, 0, c.width, c.height);
        pts.forEach(p => { p.x += p.vx; p.y += p.vy; if (p.x < 0 || p.x > c.width) p.vx *= -1; if (p.y < 0 || p.y > c.height) p.vy *= -1; ctx.beginPath(); ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2); ctx.fillStyle = `hsla(${p.hue},80%,70%,.4)`; ctx.fill() });
        for (let i = 0; i < pts.length; i++)for (let j = i + 1; j < pts.length; j++) { const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx * dx + dy * dy); if (d < 100) { ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.strokeStyle = `rgba(59,130,246,${.08 * (1 - d / 100)})`; ctx.lineWidth = .5; ctx.stroke() } }
        requestAnimationFrame(draw);
      }; draw();
    })();

    const M_COLORS = { GET: '#10b981', POST: '#3b82f6', PUT: '#f59e0b', DELETE: '#ef4444', PATCH: '#8b5cf6' };
    const M_BG = { GET: 'rgba(16,185,129,.15)', POST: 'rgba(59,130,246,.15)', PUT: 'rgba(245,158,11,.15)', DELETE: 'rgba(239,68,68,.15)', PATCH: 'rgba(139,92,246,.15)' };

    function colorJSON(j) {
      if (typeof j !== 'string') j = JSON.stringify(j, null, 2);
      return j.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/(\"(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\\"])*\"(\s*:)?|\b(true|false|null)\b|-?\d+\.?\d*)/g, m => {
          if (/^\"/.test(m)) return /:$/.test(m) ? `<span class="j-key">${m}</span>` : `<span class="j-str">${m}</span>`;
          if (/true|false/.test(m)) return `<span class="j-bool">${m}</span>`;
          if (/null/.test(m)) return `<span class="j-null">${m}</span>`;
          return `<span class="j-num">${m}</span>`;
        });
    }

    let spec = null;
    const refMap = {};

    function resolveRef(obj) {
      if (!obj) return obj;
      if (obj.$ref) {
        const path = obj.$ref.split('/').slice(1);
        let curr = spec;
        for (const p of path) {
          if (!curr[p]) return obj;
          curr = curr[p];
        }
        return curr;
      }
      return obj;
    }

    function resolveSchemaFields(schema) {
      let fields = {};
      if (schema.properties) {
        Object.keys(schema.properties).forEach(k => {
          const p = resolveRef(schema.properties[k]);
          fields[k] = p.default || (p.type === 'string' ? '' : (p.type === 'boolean' ? false : null));
        });
      }
      return fields;
    }

    async function loadSpec() {
      const r = await fetch('/openapi.json');
      spec = await r.json();

      const info = spec.info || {};
      document.getElementById('api-title').textContent = info.title || 'API';
      document.getElementById('api-desc').textContent = info.description || '';
      document.getElementById('api-version').textContent = info.version || '—';
      document.getElementById('api-openapi').textContent = spec.openapi || '3.0';

      const paths = spec.paths || {};
      let total = 0;
      for (const p of Object.values(paths)) total += Object.keys(p).length;
      document.getElementById('api-endpoints').textContent = total;

      buildSidebar(paths);
      buildSections(paths, spec.components || {});
    }

    function buildSidebar(paths) {
      const sb = document.getElementById('sb-list');
      const groups = {};
      for (const [path, methods] of Object.entries(paths)) {
        for (const [method, op] of Object.entries(methods)) {
          const tag = (op.tags && op.tags[0]) || 'default';
          if (!groups[tag]) groups[tag] = [];
          groups[tag].push({ path, method: method.toUpperCase(), op });
        }
      }
      sb.innerHTML = Object.entries(groups).map(([tag, eps]) => `
    <div class="sb-section-title">${tag}</div>
    ${eps.map(e => `
      <div class="sb-item" onclick="scrollToPath('${e.path}-${e.method}')">
        <span class="m m-${e.method}">${e.method}</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.path}</span>
      </div>`).join('')}
  `).join('') + '<div class="sb-section-title">Schemas</div>' +
        Object.keys(spec.components?.schemas || {}).map(s => `
    <div class="sb-item schema" onclick="scrollToSchema('schema-${s}')">
      <span style="color:var(--purple);font-size:10px">{ }</span> ${s}
    </div>`).join('');
    }

    function filterSidebar(q) {
      q = q.toLowerCase();
      document.querySelectorAll('#sb-list .sb-item').forEach(el => {
        el.style.display = (!q || el.textContent.toLowerCase().includes(q)) ? '' : 'none';
      });
    }

    function buildSections(paths, components) {
      const groups = {};
      for (const [path, methods] of Object.entries(paths)) {
        for (const [method, op] of Object.entries(methods)) {
          const tag = (op.tags && op.tags[0]) || 'default';
          if (!groups[tag]) groups[tag] = [];
          groups[tag].push({ path, method: method.toUpperCase(), op });
        }
      }

      let html = Object.entries(groups).map(([tag, eps]) => `
    <div class="path-group">
      <div class="path-header">${tag}</div>
      <div class="path-group-grid">
        ${eps.map(e => buildPathCard(e)).join('')}
      </div>
    </div>`).join('');

      const schemas = components.schemas || {};
      if (Object.keys(schemas).length) {
        html += `<div class="path-group"><div class="path-header">Schemas / Models</div>
      <div class="path-group-grid">
      ${Object.entries(schemas).map(([name, s]) => `
        <div class="schema-card" id="schema-${name}">
          <div class="schema-header" onclick="this.parentElement.classList.toggle('open')">
            <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
              <span style="font-size:11px;padding:4px 8px;background:rgba(139,92,246,0.15);color:var(--purple);border-radius:6px;">${s.type || 'object'}</span>
              <span class="chev">▼</span>
            </div>
            <span class="schema-name" style="margin-top:auto">${name}</span>
          </div>
          <div class="schema-body">
            <pre class="json-pre">${colorJSON(s)}</pre>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
      }
      document.getElementById('sections').innerHTML = html;
    }

    function buildPathCard(e) {
      const op = e.op;
      const m = e.method;
      const id = btoa(e.path + m).replace(/=/g, '');
      const params = (op.parameters || []);
      const responses = op.responses || {};

      const paramsHTML = params.length ? `
    <div class="section-label">PARAMETERS</div>
    <table class="field-table">
      <tr><th>Name</th><th>In</th><th>Req</th><th>Input</th></tr>
      ${params.map(p => `<tr>
        <td style="width:20%"><span class="fn">${p.name}</span></td>
        <td style="width:10%;color:var(--muted);font-size:11px">${p.in}</td>
        <td style="width:10%">${p.required ? '<span class="fr">*</span>' : ''}</td>
        <td>
           <input class="param-input pi-${id}" data-name="${p.name}" data-in="${p.in}" placeholder="${p.description || 'Enter value...'}" ${p.required ? 'required' : ''}>
        </td>
      </tr>`).join('')}
    </table>` : '';

      let bodyHTML = '';
      if (op.requestBody && op.requestBody.content && op.requestBody.content['application/json']) {
        const sRef = op.requestBody.content['application/json'].schema;
        const resolved = resolveRef(sRef);
        const example = resolved ? resolveSchemaFields(resolved) : {};
        bodyHTML = `
        <div class="section-label">REQUEST BODY (JSON)</div>
        <textarea id="body-${id}" class="req-body-input" spellcheck="false">${JSON.stringify(example, null, 2)}</textarea>
      `;
      }

      const responsesHTML = `
    <div class="section-label" style="margin-top:15px">RESPONSES</div>
    ${Object.entries(responses).map(([code, r]) => `
      <div class="resp-row">
        <span class="code code-${code[0]}">${code}</span>
        <span style="font-size:13px;color:var(--muted)">${r.description || ''}</span>
      </div>`).join('')}`;

      const tryItHtml = `
    <div style="margin-top:20px;padding-top:15px;border-top:1px dashed var(--border)">
      <button class="try-btn" onclick="sendReq('${m}','${e.path}','${id}', event)">
        <span>🚀 Simulate Request</span>
      </button>
      <div id="res-${id}" class="res-container" style="display:none;"></div>
    </div>
  `;

      return `<div class="path-card" id="${e.path}-${m}">
    <div class="path-card-header" onclick="this.parentElement.classList.toggle('open')">
      <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
        <span class="m m-${m}" style="background:${M_BG[m] || 'rgba(100,116,139,.15)'};color:${M_COLORS[m] || '#fff'}">${m}</span>
        <span class="chev">▼</span>
      </div>
      <span class="path-name">${e.path}</span>
      <span class="path-summary">${op.summary || ''}</span>
    </div>
    <div class="path-body">
      <div class="path-inner">
        ${op.description ? `<div class="op-desc">${op.description}</div>` : ''}
        ${paramsHTML}
        ${bodyHTML}
        ${responsesHTML}
        ${tryItHtml}
      </div>
    </div>
  </div>`;
    }

    async function sendReq(method, path, id, e) {
      const resDiv = document.getElementById(`res-${id}`);
      const btn = e.currentTarget;
      resDiv.style.display = 'block';
      resDiv.innerHTML = '<div style="color:var(--muted);padding:10px;font-family:var(--mono);font-size:12px;">⏳ Sending...</div>';

      btn.style.transform = 'scale(0.95)';
      setTimeout(() => { btn.style.transform = 'none' }, 200);

      try {
        let finalPath = path;
        const opts = { method, headers: {} };

        const bodyInput = document.getElementById(`body-${id}`);
        if (bodyInput && bodyInput.value.trim().length > 0) {
          opts.body = bodyInput.value;
          opts.headers['Content-Type'] = 'application/json';
        }

        const queryParams = new URLSearchParams();
        document.querySelectorAll(`.pi-${id}`).forEach(inp => {
          const v = inp.value.trim();
          if (inp.dataset.in === "path") {
            finalPath = finalPath.replace(`{${inp.dataset.name}}`, v);
          } else if (inp.dataset.in === "query" && v.length > 0) {
            queryParams.append(inp.dataset.name, v);
          }
        });

        const qs = queryParams.toString();
        if (qs) finalPath += '?' + qs;

        const startTime = performance.now();
        const r = await fetch(finalPath, opts);
        const ms = (performance.now() - startTime).toFixed(1);

        let out = '';
        try {
          const j = await r.json();
          out = colorJSON(j);
        } catch (e) {
          out = await r.text();
        }

        const color = r.ok ? 'var(--green)' : 'var(--red)';
        resDiv.innerHTML = `
        <div style="font-family:var(--mono);font-size:12px;margin-bottom:8px;padding-left:4px;">
            <span style="color:${color};font-weight:bold;font-size:14px">HTTP ${r.status}</span> 
            <span style="color:var(--muted);margin-left:12px">Time: ${ms}ms</span>
        </div>
        <pre class="json-pre">${out}</pre>`;
      } catch (err) {
        resDiv.innerHTML = `<div style="color:var(--red);padding:10px;background:rgba(239,68,68,0.1);border-radius:8px">Error: ${err.message}</div>`;
      }
    }

    function scrollToPath(id) {
      const el = document.getElementById(id);
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('open'); }
    }
    function scrollToSchema(id) {
      const el = document.getElementById(id);
      if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('open'); }
    }

    // JSON Modal Logic
    window.openJsonModal = function () {
      document.getElementById('json-modal').classList.add('open');
      if (!document.getElementById('modal-json-pre').innerHTML) {
        document.getElementById('modal-json-pre').innerHTML = colorJSON(spec);
      }
    };
    window.copyJson = function (btn) {
      navigator.clipboard.writeText(JSON.stringify(spec, null, 2));
      const old = btn.innerHTML;
      btn.innerHTML = "✅ Copied!";
      btn.style.background = "rgba(16,185,129,0.15)";
      btn.style.color = "#34d399";
      setTimeout(() => {
        btn.innerHTML = old;
        btn.style.background = "";
        btn.style.color = "";
      }, 2000);
    };

    loadSpec().catch(e => {
      document.getElementById('sections').innerHTML = `<div style="color:var(--red);text-align:center;padding:60px">⚠ Failed to load spec: ${e}</div>`;
    });
  </script>
</body>

</html>
